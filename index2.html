<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aspirasi Siswa SMAN 3 Tebas</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(120deg,#004e92,#000428,#0072ff,#00c6ff);
background-size:400% 400%;
animation:bgmove 12s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
width:420px;
padding:35px;

background:rgba(255,255,255,0.12);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border-radius:20px;

box-shadow:
0 10px 40px rgba(0,0,0,0.35),
inset 0 0 10px rgba(255,255,255,0.2);

color:white;
}

h2{
text-align:center;
margin-bottom:5px;
font-weight:600;
letter-spacing:1px;
}

.datetime{
text-align:center;
font-size:14px;
margin-bottom:20px;
opacity:0.9;
}

label{
font-weight:600;
font-size:14px;
}

input, textarea, select{
width:100%;
padding:12px;
margin:8px 0 15px 0;

border:none;
border-radius:10px;

background:rgba(255,255,255,0.9);

font-size:14px;

transition:0.3s;
}

input:focus, textarea:focus, select:focus{
outline:none;
transform:scale(1.02);
box-shadow:0 0 10px rgba(0,140,255,0.6);
}

textarea{
resize:none;
}

button{

width:100%;
padding:13px;

border:none;
border-radius:12px;

font-size:16px;
font-weight:600;

color:white;

background:linear-gradient(90deg,#00c6ff,#0072ff);

cursor:pointer;

transition:0.3s;

box-shadow:
0 0 15px rgba(0,140,255,0.6);

}

button:hover{

transform:translateY(-2px);

box-shadow:
0 5px 20px rgba(0,150,255,0.9);

}

.status{
text-align:center;
margin-top:10px;
font-weight:bold;
}

.footer{
text-align:center;
font-size:12px;
margin-top:15px;
opacity:0.8;
}

.textarea-box{
position:relative;
}

.textarea-box textarea{

width:100%;
padding:15px;

border-radius:12px;
border:2px solid transparent;

background:
linear-gradient(white,white) padding-box,
linear-gradient(120deg,#00c6ff,#0072ff) border-box;

font-size:14px;

transition:0.3s;

box-shadow:0 5px 15px rgba(0,0,0,0.1);

}

.textarea-box textarea:focus{

outline:none;

transform:scale(1.02);

box-shadow:
0 0 15px rgba(0,150,255,0.7);

}

.textarea-box textarea::placeholder{

color:#777;
font-style:italic;

}

.rocket{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
font-size:40px;
opacity:0;
pointer-events:none;
}

.launch{
animation:launchRocket 1.8s ease-out forwards;
}

@keyframes launchRocket{

0%{
transform:translate(-50%,0) scale(1);
opacity:1;
}

50%{
transform:translate(-50%,-200px) scale(1.2);
opacity:1;
}

100%{
transform:translate(-50%,-500px) scale(0.8);
opacity:0;
}

}

.datetime-box{

background:rgba(255,255,255,0.15);
border-radius:14px;

padding:12px;

margin-bottom:20px;

text-align:center;

box-shadow:
0 0 15px rgba(0,150,255,0.5),
inset 0 0 8px rgba(255,255,255,0.3);

}

.date{

font-size:14px;
letter-spacing:1px;
margin-bottom:5px;

}

.time{

font-size:22px;
font-weight:bold;

color:#00eaff;

text-shadow:
0 0 10px #00eaff,
0 0 20px #00eaff;

}
</style>
</head>

<body>


<div class="container">

<h2>ISI HATI SISWA<br>SMAN 3 TEBAS</h2>

<div class="datetime-box">
<div class="date" id="date"></div>
<div class="time" id="time"></div>
</div>

<form id="aspirasiForm">

<label>Nama :</label>
<input type="text" id="nama" required>

<label>Kelas :</label>
<select id="kelas" required>
<option value="" disabled selected>Pilih Kelas</option>
<option value="XA">XA</option>
<option value="XB">XB</option>
<option value="XIA">XIA</option>
<option value="XIB">XIB</option>
<option value="XIIA">XIIA</option>
<option value="XIIB">XIIB</option>
</select>

<label>Isi Hati kamu :</label>

<div class="textarea-box">
<textarea id="isi" rows="4" required placeholder="Tulis isi hati kamu di sini..."></textarea>
</div>

<button type="submit">🚀 Kirim Aspirasi</button>

<div class="status" id="status"></div>

</form>

<div class="footer">
Smanti Web System
</div>

<div id="rocket" class="rocket">🚀</div>

</div>

<script>

function updateDateTime(){

const now = new Date();

const options = {
weekday: 'long',
year: 'numeric',
month: 'long',
day: 'numeric'
};

const tanggal = now.toLocaleDateString('id-ID', options);
const waktu = now.toLocaleTimeString('id-ID');

document.getElementById("date").innerText = "📅 " + tanggal;
document.getElementById("time").innerText = "⌚ " + waktu;

}

updateDateTime();
setInterval(updateDateTime,1000);

document.getElementById("aspirasiForm").addEventListener("submit", function(e){

e.preventDefault();

const rocket = document.getElementById("rocket");

rocket.classList.remove("launch");
void rocket.offsetWidth;
rocket.classList.add("launch");

const nama = document.getElementById("nama").value;
const kelas = document.getElementById("kelas").value;
const isi = document.getElementById("isi").value;

const now = new Date();
const tanggal = now.toLocaleDateString('id-ID');
const waktu = now.toLocaleTimeString('id-ID');

const token = "8539344864:AAEVDozs18IUtuAQPBd-bsD2xR_7y7xOuq8";
const chat_id = "7327517194";

const message = `
📩 ASPIRASI SMAN 3 TEBAS

🗓 ${tanggal} • ⏰ ${waktu}

👤 ${nama}
🎓 ${kelas}

💬
“${isi}”

🚀 via Smanti Web System
`;

fetch(`https://api.telegram.org/bot${token}/sendMessage`,{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:chat_id,
text:message
})

})

.then(response=>response.json())

.then(data=>{
document.getElementById("status").style.color="lightgreen";
document.getElementById("status").innerText="Aspirasi berhasil dikirim!";
document.getElementById("aspirasiForm").reset();
})

.catch(error=>{
document.getElementById("status").style.color="red";
document.getElementById("status").innerText="Gagal mengirim.";
});

});


</script>

</body>
</html>
